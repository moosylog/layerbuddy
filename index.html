<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoErgo Layer Buddy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(51, 65, 85, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --danger: #f87171;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --danger-glow: rgba(239, 68, 68, 0.4);
            --success: #34d399;
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-glow: rgba(52, 211, 153, 0.4);
            --warning: #fbbf24;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --magic: #c084fc;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(192, 132, 252, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main); 
            padding: 3rem 1.5rem; 
            max-width: 1000px; 
            margin: 0 auto; 
            line-height: 1.6; 
            min-height: 100vh;
        }

        /* Typography */
        h1 { text-align: center; margin-bottom: 0.5rem; font-size: 3rem; font-weight: 800; letter-spacing: -1px; background: linear-gradient(to right, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 3rem; font-size: 1.2rem; }
        
        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Upload Zone */
        .upload-container { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .upload-container.hidden { opacity: 0; transform: scale(0.95); height: 0; overflow: hidden; margin: 0; padding: 0; pointer-events: none; }
        
        .upload-zone { border: 2px dashed rgba(56, 189, 248, 0.5); padding: 5rem 2rem; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .upload-zone:hover { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); box-shadow: 0 0 30px var(--primary-glow); }
        .upload-icon { width: 64px; height: 64px; fill: var(--primary); margin-bottom: 1.5rem; filter: drop-shadow(0 0 8px var(--primary-glow)); transition: transform 0.3s ease; }
        .upload-zone:hover .upload-icon { transform: translateY(-5px); }
        input[type="file"] { display: none; }
        
        /* Small Reset Button */
        .reset-btn { display: none; margin: 0 auto 2rem auto; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .reset-btn:hover { color: var(--text-main); border-color: var(--text-muted); }
        .reset-btn.visible { display: block; animation: fadeIn 0.5s forwards; }

        /* Animations */
        .stagger-1 { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both; opacity: 0; }
        .stagger-2 { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; opacity: 0; }
        .stagger-3 { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; opacity: 0; }
        .stagger-4 { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both; opacity: 0; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* Results Container */
        .results-container { display: none; flex-direction: column; gap: 2rem; }
        .results-container.visible { display: flex; }
        
        /* Status Hero */
        .status-hero { padding: 1.5rem 2rem; border-radius: 16px; text-align: center; font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 1rem; border: 1px solid; }
        .status-hero.needs-fix { background: var(--danger-bg); border-color: rgba(248, 113, 113, 0.3); color: #fecaca; box-shadow: 0 0 40px var(--danger-glow); }
        .status-hero.perfect { background: var(--success-bg); border-color: rgba(52, 211, 153, 0.3); color: #a7f3d0; box-shadow: 0 0 40px var(--success-glow); }

        /* Action Plan */
        .action-plan { padding: 2.5rem; position: relative; overflow: hidden; border: 1px solid rgba(56, 189, 248, 0.3); box-shadow: 0 0 40px rgba(56, 189, 248, 0.1); }
        .action-plan::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), var(--magic)); }
        .action-plan h2 { color: #e0f2fe; margin-top: 0; font-size: 1.8rem; margin-bottom: 1.5rem; letter-spacing: -0.5px; }
        .action-plan ol { padding-left: 1.5rem; margin-bottom: 0; font-size: 1.15rem; color: #cbd5e1; }
        .action-plan ol li { margin-bottom: 1rem; }
        .action-plan ol li strong { color: #f8fafc; }
        
        /* Split Views */
        .split-view { display: flex; gap: 3rem; flex-wrap: wrap; }
        .split-view > div { flex: 1; min-width: 300px; }

        /* Layer Lists */
        .layer-list { list-style: none; padding: 0; margin: 0; }
        .layer-item { padding: 0.85rem 1.25rem; border-radius: 12px; margin-bottom: 0.75rem; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); display: flex; align-items: center; font-weight: 500; font-size: 1.05rem; color: #e2e8f0; transition: transform 0.2s; }
        .layer-item:hover { transform: translateX(5px); border-color: rgba(255,255,255,0.2); }
        .layer-item .num { background: rgba(255,255,255,0.1); color: #fff; padding: 0.2rem 0.7rem; border-radius: 8px; margin-right: 1rem; font-weight: 700; font-family: monospace; font-size: 1.1rem; }
        
        .layer-item.error { border-color: rgba(239, 68, 68, 0.5); background: linear-gradient(90deg, rgba(239, 68, 68, 0.1), transparent); }
        .layer-item.error .num { background: var(--danger); box-shadow: 0 0 10px var(--danger-glow); }
        .layer-item.success { border-color: rgba(52, 211, 153, 0.3); }
        .layer-item.success .num { background: var(--success); color: #064e3b; box-shadow: 0 0 10px var(--success-glow); }
        .layer-item.magic { border-color: rgba(192, 132, 252, 0.3); }
        .layer-item.magic .num { background: var(--magic); box-shadow: 0 0 10px rgba(192, 132, 252, 0.4); }

        .tag { font-size: 0.8rem; margin-left: auto; padding: 0.25rem 0.75rem; border-radius: 8px; font-weight: 600; background: rgba(255,255,255,0.05); color: #94a3b8; }
        .tag.anchor { background: rgba(56, 189, 248, 0.1); color: var(--primary); }
        
        /* 2.5D Animated Isometric Visualizer */
        .viz-outer { padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; overflow: visible; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 100%); }
        .stack-wrapper { position: relative; width: 340px; animation: float 6s ease-in-out infinite; }
        .stack-layer { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 140px; 
            background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; 
            display: flex; align-items: center; padding: 0 1.5rem; box-sizing: border-box; 
            font-size: 1.15rem; font-weight: 600; color: #f1f5f9; cursor: pointer;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: -10px 20px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transform-origin: bottom center; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            transform: translateY(calc(var(--z-idx) * -28px)) rotateX(55deg) rotateZ(-20deg); 
        }
        
        .viz-outer:hover .stack-layer { transform: translateY(calc(var(--z-idx) * -65px)) rotateX(40deg) rotateZ(-10deg); background: rgba(30, 41, 59, 0.95); }

        .stack-layer.base { background: rgba(6, 78, 59, 0.8); border-color: rgba(52, 211, 153, 0.5); box-shadow: -10px 20px 30px rgba(0,0,0,0.5), 0 0 20px rgba(52, 211, 153, 0.1); }
        .stack-layer.blocking { background: rgba(127, 29, 29, 0.9); border-color: rgba(248, 113, 113, 0.6); box-shadow: -10px 20px 30px rgba(0,0,0,0.5), 0 0 30px rgba(239, 68, 68, 0.3); }
        .stack-layer .l-icon { margin-right: 1rem; font-size: 1.5rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        
        .viz-legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 3rem; font-size: 0.95rem; color: var(--text-muted); flex-wrap: wrap; }
        .viz-legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .viz-box { width: 14px; height: 14px; border-radius: 4px; }
        .viz-glass { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.2); }
        .viz-solid { background: rgba(127, 29, 29, 0.9); border: 1px solid rgba(248, 113, 113, 0.6); }

        /* Sleek Accordions */
        details { background: rgba(15, 23, 42, 0.4); border-radius: 16px; margin-bottom: 1rem; border: 1px solid var(--border); overflow: hidden; transition: all 0.3s ease; }
        details[open] { background: rgba(15, 23, 42, 0.8); border-color: rgba(255,255,255,0.2); }
        summary { padding: 1.25rem 1.5rem; font-size: 1.15rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; list-style: none; user-select: none; }
        summary::-webkit-details-marker { display: none; } 
        summary:hover { background: rgba(255,255,255,0.02); }
        .summary-title { display: flex; align-items: center; gap: 0.75rem; color: #e2e8f0; }
        .chevron { transition: transform 0.3s ease; color: #64748b; }
        details[open] summary .chevron { transform: rotate(180deg); }
        details[open] summary { border-bottom: 1px solid var(--border); }
        .details-content { padding: 1.5rem; font-size: 1rem; color: #cbd5e1; }
        
        .badge { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 99px; font-weight: 700; margin-left: 0.5rem; }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.5); }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.5); }

        .issue-list { list-style: none; padding: 0; margin: 0; }
        .issue-list li { background: rgba(0,0,0,0.2); padding: 1rem 1.25rem; border-radius: 12px; margin-bottom: 0.75rem; border: 1px solid var(--border); border-left: 4px solid var(--text-muted); }
        details.danger-theme .issue-list li { border-left-color: var(--danger); }
        details.warning-theme .issue-list li { border-left-color: var(--warning); }

        /* Course Cards */
        .course-card { background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 16px; margin-bottom: 1rem; border: 1px solid rgba(192, 132, 252, 0.3); }
        .course-card h4 { color: #e879f9; margin-top: 0; margin-bottom: 0.75rem; font-size: 1.15rem; display: flex; align-items: center; gap: 0.5rem; }
        .course-card p { margin: 0; color: #cbd5e1; }

        code { background: rgba(0,0,0,0.4); padding: 0.2rem 0.5rem; border-radius: 6px; font-family: monospace; color: #fca5a5; border: 1px solid rgba(255,255,255,0.05); }
        .fix-hint { display: block; margin-top: 0.75rem; color: #7dd3fc; font-size: 0.95em; font-weight: 600; padding-top: 0.75rem; border-top: 1px dashed rgba(255,255,255,0.1); }
        
        .ai-warning { margin-top: 4rem; padding: 1.5rem; text-align: center; font-size: 0.9rem; color: #64748b; }
    </style>
</head>
<body>

    <h1>MoErgo Layer Buddy</h1>
    <p class="subtitle">Upload your layout. Find hidden bugs. Fix them instantly.</p>

    <div class="glass-panel upload-zone upload-container" id="dropZone">
        <svg class="upload-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/24/svg">
            <path d="M19 13v5c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2v-5H3v5c0 2.2 1.8 4 4 4h10c2.2 0 4-1.8 4-4v-5h-2zm-6-2.2l2.6 2.6 1.4-1.4-5-5-5 5 1.4 1.4 2.6-2.6V17h2v-6.2z"/>
        </svg>
        <br>
        <label for="fileInput" class="btn" style="background: linear-gradient(135deg, var(--primary), #818cf8); border: none;">Select MoErgo .JSON File</label>
        <input type="file" id="fileInput" accept=".json">
        <p style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">or drag and drop your file here</p>
    </div>

    <button class="reset-btn" id="resetBtn" onclick="location.reload()">Upload another layout</button>

    <div class="results-container" id="resultsArea"></div>

    <div class="ai-warning stagger-4">
        🤖 <strong>AI-Assisted Tool:</strong> Designed to help you learn ZMK. Always verify your logic in the official MoErgo editor!
    </div>

    <script>
        const MASKING_BEHAVIORS = { "&mo": 0, "&lt": 0, "&sl": 0, "&layer": 0, "&ltt": 0, "&tog": 0, "&zip_temp_layer": 0 };
        const ALTERNATE_BASE_BEHAVIORS = { "&to": 0 }; 
        const ALL_LAYER_BEHAVIORS = { "&mo": 0, "&lt": 0, "&sl": 0, "&tog": 0, "&layer": 0, "&ltt": 0, "&to": 0, "&zip_temp_layer": 0 };

        function getParamValue(param) { return (param === undefined || param === null) ? null : (typeof param === "object" ? param.value : param); }
        function escapeHtml(str) { return str ? str.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ""; }

        function parseMoErgoFile(file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const rawData = JSON.parse(e.target.result);
                    let root = rawData;
                    if (rawData && typeof rawData === 'object') {
                        if (rawData.layers) root = rawData;
                        else if (rawData.keymap && rawData.keymap.layers) root = rawData.keymap;
                        else if (rawData.layout && rawData.layout.layers) root = rawData.layout;
                        else if (rawData.keymap) root = rawData.keymap; 
                    }
                    if (!root || !root.layers) throw new Error("Could not find the '.layers' array. Ensure this is a MoErgo JSON Backup.");
                    if (!root.layer_names) root.layer_names = root.layers.map((_, i) => `Layer ${i}`);
                    callback(null, root);
                } catch (err) { callback(err, null); }
            };
            reader.onerror = () => callback(new Error("Failed to read the file."), null);
            reader.readAsText(file);
        }

        function analyzeAndSortLayers(root) {
            const layerNames = root.layer_names || [];
            const numLayers = Math.max(layerNames.length, (root.layers ? root.layers.length : 0));
            const getLayerLabel = (idx) => `Layer ${idx} (${escapeHtml(layerNames[idx] || 'Unnamed')})`;

            let magicLayerIndex = -1, lowerLayerIndex = -1;
            layerNames.forEach((name, idx) => { 
                if (name && typeof name === "string") {
                    if (name.toLowerCase() === "magic") magicLayerIndex = idx; 
                    if (name.toLowerCase() === "lower") lowerLayerIndex = idx;
                }
            });
            
            const customWrappers = {};
            let usesHRM = false, usesToggles = false;

            ['holdTaps', 'macros', 'tapDances', 'behaviors', 'modMorphs'].forEach(arrName => {
                if (Array.isArray(root[arrName])) {
                    root[arrName].forEach(item => {
                        if (item.name && Array.isArray(item.bindings)) {
                            customWrappers[item.name] = { type: arrName, bindings: item.bindings };
                            if (arrName === 'holdTaps') usesHRM = true;
                        }
                    });
                }
            });

            const criticalBugs = new Set(), trackpadBugs = new Set(), maskingNotices = new Set(), orphanedNotices = new Set();
            const targetedLayers = new Set([0]); 
            const problemLayers = new Set();
            const dependencies = Array.from({ length: numLayers }, () => new Set());
            
            const baseLayerTargets = new Set([0]);
            const momentaryLayerTargets = new Set();

            const condLayers = root.conditional_layers || root.conditionalLayers || [];
            if (Array.isArray(condLayers)) {
                condLayers.forEach(cond => {
                    if (cond.then_layer !== undefined) {
                        const tl = Number(cond.then_layer);
                        if (!isNaN(tl)) { targetedLayers.add(tl); momentaryLayerTargets.add(tl); }
                    }
                    if (cond.if_layers && Array.isArray(cond.if_layers)) {
                        cond.if_layers.forEach(l => {
                            const il = Number(l);
                            if (!isNaN(il)) targetedLayers.add(il);
                        });
                    }
                });
            }

            function validateTarget(rawVal, contextMsg, isMasking, isBase) {
                if (rawVal === null || rawVal === undefined || rawVal === "") {
                    criticalBugs.add(`<strong>${contextMsg}</strong> has an empty layer-switch. It doesn't know where to go.`);
                    return null;
                }
                let val = Number(rawVal);
                if (!isNaN(val) && Number.isInteger(val)) {
                    if (val >= numLayers || val < 0) {
                        criticalBugs.add(`<strong>${contextMsg}</strong> tries to open <strong>Layer ${val}</strong>, but that layer doesn't exist!`);
                        return null;
                    }
                    targetedLayers.add(val);
                    if (isBase) baseLayerTargets.add(val);
                    if (isMasking) momentaryLayerTargets.add(val);
                    return isMasking ? val : null;
                }
                return null;
            }

            function extractTargets(rawNode, contextMsg, sourceLayerIdx = -1, visited = new Set()) {
                let targets = [];
                if (!rawNode) return targets;

                let node = (typeof rawNode === "string") ? { value: rawNode.trim().split(/\s+/)[0], params: rawNode.trim().split(/\s+/).slice(1) } : rawNode;
                if (typeof node !== "object" || Array.isArray(node)) {
                    if (Array.isArray(node)) node.forEach(child => targets.push(...extractTargets(child, contextMsg, sourceLayerIdx, visited)));
                    return targets;
                }

                if (node.value) {
                    if (node.value === "&tog") usesToggles = true;

                    if (ALL_LAYER_BEHAVIORS[node.value] !== undefined) {
                        const val = getParamValue(node.params?.[ALL_LAYER_BEHAVIORS[node.value]]);
                        const validTarget = validateTarget(val, contextMsg, MASKING_BEHAVIORS[node.value] !== undefined, ALTERNATE_BASE_BEHAVIORS[node.value] !== undefined);
                        if (validTarget !== null) targets.push(validTarget);
                    } 
                    else if (node.value === "&magic" && magicLayerIndex !== -1) { targetedLayers.add(magicLayerIndex); targets.push(magicLayerIndex); momentaryLayerTargets.add(magicLayerIndex); }
                    else if (node.value === "&lower" && lowerLayerIndex !== -1) { targetedLayers.add(lowerLayerIndex); targets.push(lowerLayerIndex); momentaryLayerTargets.add(lowerLayerIndex); }
                    else if (customWrappers[node.value] && customWrappers[node.value].type === 'holdTaps') {
                        customWrappers[node.value].bindings.forEach((binding, idx) => {
                            if (!binding) return; 
                            let bindNode = (typeof binding === "string") ? { value: binding.trim().split(/\s+/)[0], params: binding.trim().split(/\s+/).slice(1) } : binding;
                            
                            if (bindNode && bindNode.value) {
                                if (ALL_LAYER_BEHAVIORS[bindNode.value] !== undefined) {
                                    const val = getParamValue(node.params?.[idx]);
                                    const validTarget = validateTarget(val, contextMsg, MASKING_BEHAVIORS[bindNode.value] !== undefined, ALTERNATE_BASE_BEHAVIORS[bindNode.value] !== undefined);
                                    if (validTarget !== null) targets.push(validTarget);
                                } else if (bindNode.value === "&magic" && magicLayerIndex !== -1) { targetedLayers.add(magicLayerIndex); targets.push(magicLayerIndex); momentaryLayerTargets.add(magicLayerIndex); }
                            }
                        });
                    }
                    else if (customWrappers[node.value] && !visited.has(node.value)) {
                        visited.add(node.value);
                        customWrappers[node.value].bindings.forEach(childNode => targets.push(...extractTargets(childNode, contextMsg, sourceLayerIdx, visited)));
                        visited.delete(node.value);
                    }
                }

                for (const key in node) {
                    if (node.hasOwnProperty(key)) {
                        const child = node[key];
                        if (key === "layers" && Array.isArray(child)) continue;
                        if (Array.isArray(child)) child.forEach(c => targets.push(...extractTargets(c, contextMsg, sourceLayerIdx, visited)));
                        else if (typeof child === "object" && child !== null) targets.push(...extractTargets(child, contextMsg, sourceLayerIdx, visited));
                    }
                }
                return targets;
            }

            if (Array.isArray(root.layers)) {
                root.layers.forEach((layerKeys, sourceIdx) => {
                    if (sourceIdx >= numLayers) return;
                    layerKeys.forEach(node => {
                        const targets = extractTargets(node, getLayerLabel(sourceIdx), sourceIdx);
                        targets.forEach(targetIdx => {
                            if (targetIdx < sourceIdx) {
                                problemLayers.add(sourceIdx);
                                maskingNotices.add(`A button on <strong>${getLayerLabel(sourceIdx)}</strong> tries to open <strong>${getLayerLabel(targetIdx)}</strong>. Because ${getLayerLabel(sourceIdx)} is higher up, it blocks the view!`);
                            }
                            if (dependencies[sourceIdx] && targetIdx !== sourceIdx) dependencies[sourceIdx].add(targetIdx);
                        });
                    });
                });
            }

            if (Array.isArray(root.combos)) {
                root.combos.forEach((combo, comboIdx) => {
                    const comboName = combo.name || `Combo #${comboIdx + 1}`;
                    const targets = extractTargets(combo, comboName);
                    if (targets.length > 0) {
                        const isGlobal = !combo.layers || !Array.isArray(combo.layers) || combo.layers.length === 0 || combo.layers.includes(-1);
                        let activeLayers = isGlobal ? layerNames.map((_, i) => i) : combo.layers.filter(l => l >= 0 && l < numLayers);
                        let globalComboFlagged = false;

                        targets.forEach(targetIdx => {
                            activeLayers.forEach(sourceIdx => {
                                if (sourceIdx >= numLayers || sourceIdx < 0) return;
                                if (targetIdx < sourceIdx) {
                                    problemLayers.add(sourceIdx);
                                    if (isGlobal) {
                                        if (!globalComboFlagged) {
                                            maskingNotices.add(`<strong>Global Combo:</strong> <code>${comboName}</code> opens <strong>${getLayerLabel(targetIdx)}</strong>, but triggers on <em>all</em> layers. If used from a higher layer, it gets blocked! <span class="fix-hint">💡 Fix: Restrict 'Active Layers' so it only triggers on layers up to ${getLayerLabel(targetIdx)}.</span>`);
                                            globalComboFlagged = true;
                                        }
                                    } else {
                                        maskingNotices.add(`<code>${comboName}</code> triggers on ${getLayerLabel(sourceIdx)}, but tries to open ${getLayerLabel(targetIdx)}. ${getLayerLabel(sourceIdx)} will remain on top and block it.`);
                                    }
                                }
                                if (dependencies[sourceIdx] && targetIdx !== sourceIdx) dependencies[sourceIdx].add(targetIdx);
                            });
                        });
                    }
                });
            }

            if (Array.isArray(root.inputListeners)) {
                root.inputListeners.forEach(listener => {
                    if (["&cirque_lh_listener", "&cirque_rh_listener"].includes(listener.value) && Array.isArray(listener.nodes)) {
                        let prevLayerIdx = Infinity; 
                        listener.nodes.forEach(node => {
                            extractTargets(node, `Trackpad`).forEach(t => targetedLayers.add(t)); 
                            const nodeLayers = node.layers ? node.layers : (node.layer !== undefined ? [node.layer] : []);
                            nodeLayers.forEach(currentLayer => {
                                if (typeof currentLayer === "number") {
                                    targetedLayers.add(currentLayer); 
                                    if (currentLayer > prevLayerIdx) {
                                        trackpadBugs.add(`Trackpads read lists top-to-bottom. Your broad <strong>${getLayerLabel(prevLayerIdx)}</strong> is listed <em>above</em> your specific <strong>${getLayerLabel(currentLayer)}</strong>. ${getLayerLabel(currentLayer)} will always be ignored.`);
                                    }
                                    prevLayerIdx = currentLayer;
                                }
                            });
                        });
                    }
                });
            }

            if (baseLayerTargets.size > 1 && momentaryLayerTargets.size > 0) {
                const highestBase = Math.max(...baseLayerTargets);
                const lowestMomentary = Math.min(...Array.from(momentaryLayerTargets).filter(x => x > 0));
                
                if (highestBase > lowestMomentary) {
                    maskingNotices.add(`<strong>Base Layer Trap:</strong> You have an Alternate Base Layer at <strong>${getLayerLabel(highestBase)}</strong> stacked higher than your Symbol layers. Turning it on will block your symbols! <span class="fix-hint">💡 Fix: Drag your Alternate Base Layers down right above your default Base Layer.</span>`);
                    problemLayers.add(highestBase);
                }
            }

            layerNames.forEach((name, idx) => {
                if (!targetedLayers.has(idx)) orphanedNotices.add(`<strong>${getLayerLabel(idx)}</strong> is unused. No buttons or combos point to it.`);
            });

            let inDegree = Array(numLayers).fill(0);
            let adjList = Array(numLayers).fill().map(() => []);
            const layersToSort = [];
            for (let i = 1; i < numLayers; i++) { if (i !== magicLayerIndex) layersToSort.push(i); }

            layersToSort.forEach(source => {
                if (dependencies[source]) {
                    dependencies[source].forEach(target => {
                        if (layersToSort.includes(target)) { adjList[source].push(target); inDegree[target]++; }
                    });
                }
            });

            let queue = [];
            layersToSort.forEach(i => { if (inDegree[i] === 0) queue.push(i); });
            let middleOrder = [];
            while (queue.length > 0) {
                let current = queue.shift();
                middleOrder.push(current);
                adjList[current].forEach(neighbor => {
                    inDegree[neighbor]--;
                    if (inDegree[neighbor] === 0) queue.push(neighbor);
                });
            }
            layersToSort.forEach(i => { if (!middleOrder.includes(i)) middleOrder.push(i); });

            let finalOrder = [0, ...middleOrder];
            if (magicLayerIndex !== -1) {
                finalOrder.push(magicLayerIndex);
                if (magicLayerIndex !== numLayers - 1) {
                    problemLayers.add(magicLayerIndex);
                    maskingNotices.add(`The <strong>${getLayerLabel(magicLayerIndex)}</strong> must be at the very bottom of your list so normal layers don't block it.`);
                }
            }

            return {
                names: layerNames, criticalBugs: Array.from(criticalBugs), trackpadBugs: Array.from(trackpadBugs),
                maskingNotices: Array.from(maskingNotices), orphanedNotices: Array.from(orphanedNotices),
                problemLayers: problemLayers, suggestedOrder: finalOrder, magicIndex: magicLayerIndex, 
                targetedLayers: targetedLayers, usesHRM: usesHRM, usesToggles: usesToggles
            };
        }

        function renderResults(data) {
            document.getElementById('dropZone').classList.add('hidden');
            document.getElementById('resetBtn').classList.add('visible');

            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = ''; 

            let orderIsPerfect = true;
            data.suggestedOrder.forEach((oldIdx, newIdx) => { if (oldIdx !== newIdx) orderIsPerfect = false; });
            const hasBugs = data.criticalBugs.length > 0 || data.trackpadBugs.length > 0 || data.maskingNotices.length > 0;

            // 1. HERO BANNER
            if (!hasBugs && orderIsPerfect) {
                resultsArea.innerHTML += `<div class="status-hero perfect glass-panel stagger-1">🎉 Awesome! Your keyboard layout logic is flawless.</div>`;
            } else {
                resultsArea.innerHTML += `<div class="status-hero needs-fix glass-panel stagger-1">⚠️ We found a few bugs! Just follow the Action Plan below to fix them.</div>`;
            }

            // 2. THE ACTION PLAN
            if (!orderIsPerfect || data.trackpadBugs.length > 0) {
                const targetListHtml = data.suggestedOrder.map((oldIdx, newIdx) => {
                    const displayName = data.names[oldIdx] || "Unnamed";
                    if (oldIdx === 0) return `<li class="layer-item"><span class="num">${newIdx}</span> ${escapeHtml(displayName)} <span class="tag anchor">Base Layer</span></li>`;
                    if (oldIdx === data.magicIndex) return `<li class="layer-item magic"><span class="num">${newIdx}</span> ${escapeHtml(displayName)} <span class="tag anchor">System Layer</span></li>`;
                    let tag = oldIdx !== newIdx ? `<span class="tag moved">(Move from ${oldIdx})</span>` : '';
                    return `<li class="layer-item success"><span class="num">${newIdx}</span> ${escapeHtml(displayName)} ${tag}</li>`;
                }).join('');

                resultsArea.innerHTML += `
                    <div class="action-plan glass-panel stagger-2">
                        <h2>🛠️ Action Plan</h2>
                        <div class="split-view">
                            <div>
                                <ol>
                                    <li>Open your layout in the <strong>MoErgo web editor</strong>.</li>
                                    <li>Click on the <strong>Layers</strong> tab on the left menu.</li>
                                    <li><strong>Drag and drop</strong> your layers up or down until they match the Target Order exactly.</li>
                                    ${data.trackpadBugs.length > 0 ? '<li>Go to <strong>Input Listeners</strong> and re-order the Cirque blocks so specific speeds are above broad mouse layers.</li>' : ''}
                                    <li>Click <strong>Save</strong> and rebuild your firmware!</li>
                                </ol>
                            </div>
                            <div>
                                <h3 style="margin-top:0; font-size:1.1rem; color:#f8fafc; font-weight: 600;">🎯 Target Order</h3>
                                <ul class="layer-list">${targetListHtml}</ul>
                            </div>
                        </div>
                    </div>`;
            }

            // 3. THE 2.5D VISUALIZER & ACCORDIONS
            if (hasBugs || data.orphanedNotices.length > 0 || !orderIsPerfect) {
                let detailsHtml = `<div class="stagger-3">`;
                
                if (data.maskingNotices.length > 0) {
                    const hoverZGap = 55; 
                    const physicalCardHeight = 140;
                    const wrapperHeight = physicalCardHeight + (data.names.length * hoverZGap);
                    
                    let stackHtml = `
                        <div class="glass-panel viz-outer">
                            <div class="stack-wrapper" style="height: ${wrapperHeight}px;" title="Hover to inspect layers">`;
                    
                    data.names.forEach((name, idx) => {
                        let isProblem = data.problemLayers.has(idx);
                        let isBase = idx === 0;
                        let cssClass = isProblem ? 'blocking' : (isBase ? 'base' : '');
                        let displayName = name || `Layer ${idx}`;
                        let icon = isProblem ? '🛑' : (isBase ? '⚓' : '✨');
                        
                        stackHtml += `<div class="stack-layer ${cssClass}" style="--z-idx: ${idx}; z-index: ${idx};">
                            <span class="l-icon">${icon}</span>
                            <span class="l-name">${idx}: ${escapeHtml(displayName)}</span>
                        </div>`;
                    });
                    
                    stackHtml += `
                            </div>
                            <div class="viz-legend">
                                <div class="viz-legend-item"><div class="viz-box viz-glass"></div> Valid Layer</div>
                                <div class="viz-legend-item"><div class="viz-box viz-base"></div> Base Layer</div>
                                <div class="viz-legend-item"><div class="viz-box viz-solid"></div> Blocking Layer (Bug)</div>
                            </div>
                        </div>
                    `;

                    detailsHtml += `
                        <details class="warning-theme glass-panel" open>
                            <summary>
                                <div class="summary-title"><span>⚠️ Blocked Layers (Visualizer)</span> <span class="badge badge-warning">${data.maskingNotices.length}</span></div>
                                <span class="chevron">▼</span>
                            </summary>
                            <div class="details-content">
                                <p style="margin-bottom: 2.5rem;">ZMK layers act like stacked sheets of clear plastic. You have buttons on the <strong>Red Layers</strong> trying to open a layer beneath them. Because the red layer is physically higher in the stack, it stays on top and completely blocks your view! <em>(Hover over the stack below to expand it)</em></p>
                                ${stackHtml}
                                <ul class="issue-list" style="margin-top: 2rem;">${data.maskingNotices.map(i => `<li>${i}</li>`).join('')}</ul>
                            </div>
                        </details>`;
                }

                if (data.criticalBugs.length > 0) {
                    detailsHtml += `
                        <details class="danger-theme glass-panel">
                            <summary>
                                <div class="summary-title"><span>🚨 Critical Logic Bugs</span> <span class="badge badge-danger">${data.criticalBugs.length}</span></div>
                                <span class="chevron">▼</span>
                            </summary>
                            <div class="details-content">
                                <p>These issues point to broken references or ghost layers. They will cause compile errors or dead buttons.</p>
                                <ul class="issue-list">${data.criticalBugs.map(i => `<li>${i}</li>`).join('')}</ul>
                            </div>
                        </details>`;
                }
                if (data.trackpadBugs.length > 0) {
                    detailsHtml += `
                        <details class="danger-theme glass-panel">
                            <summary>
                                <div class="summary-title"><span>🖱️ Trackpad Priority Errors</span> <span class="badge badge-danger">${data.trackpadBugs.length}</span></div>
                                <span class="chevron">▼</span>
                            </summary>
                            <div class="details-content">
                                <p>ZMK reads trackpad lists top-to-bottom and stops at the very first match.</p>
                                <ul class="issue-list">${data.trackpadBugs.map(i => `<li>${i}</li>`).join('')}</ul>
                            </div>
                        </details>`;
                }
                if (data.orphanedNotices.length > 0) {
                    detailsHtml += `
                        <details class="glass-panel">
                            <summary>
                                <div class="summary-title"><span>ℹ️ Unused Layers</span> <span class="badge badge-info">${data.orphanedNotices.length}</span></div>
                                <span class="chevron">▼</span>
                            </summary>
                            <div class="details-content">
                                <p>These layers take up memory but are never activated by your layout.</p>
                                <ul class="issue-list">${data.orphanedNotices.map(i => `<li>${i}</li>`).join('')}</ul>
                            </div>
                        </details>`;
                }
                detailsHtml += `</div>`;
                resultsArea.innerHTML += detailsHtml;
            }

            // 4. BUDDY'S ZMK CRASH COURSE
            let cheatSheetHtml = `
                <details class="glass-panel stagger-4">
                    <summary>
                        <div class="summary-title"><span>🧠 Buddy's ZMK Cheat Sheet</span></div>
                        <span class="chevron">▼</span>
                    </summary>
                    <div class="details-content">
                        <p style="margin-bottom:2rem;">ZMK is powerful, but it has some quirks. Here are a few tips based on how you built your layout!</p>
                        <div class="split-view">
                            <div class="course-card">
                                <h4>▽ Transparent vs. 🚫 None</h4>
                                <p>When you leave a key blank in the editor, it becomes <code>&amp;none</code>. This acts like a brick wall—if you press it, nothing happens. If you want the key from the layer <em>below</em> to shine through, you must set the key to <strong>Transparent (▽)</strong>.</p>
                            </div>
                            ${data.usesToggles ? `
                            <div class="course-card">
                                <h4>🔀 The Toggle Trap</h4>
                                <p>You are using <code>&amp;tog</code>. Remember: ZMK adds toggled layers to a permanent stack. If you toggle a layer ON, it stays there forever until you toggle it OFF. Always make sure a toggled layer has a button to toggle itself back off, otherwise you'll be trapped!</p>
                            </div>` : ''}
                            ${data.usesHRM ? `
                            <div class="course-card">
                                <h4>⏱️ Timing (Hold-Taps)</h4>
                                <p>You are using custom Hold-Taps (like Home Row Mods). If you find yourself accidentally typing letters when you meant to hold Shift, you need to tweak the <strong>Timing</strong>. Adjust the <code>tapping-term-ms</code> (usually 150-200ms) or try setting the <code>flavor</code> to <em>tap-preferred</em>.</p>
                            </div>` : ''}
                        </div>
                    </div>
                </details>
            `;
            resultsArea.innerHTML += cheatSheetHtml;
            resultsArea.classList.add('visible');
        }

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--primary)"; dropZone.style.background = "rgba(56, 189, 248, 0.05)"; });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.style.borderColor = ""; dropZone.style.background = ""; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = ""; dropZone.style.background = "";
            if (e.dataTransfer.files.length) {
                if (!e.dataTransfer.files[0].name.toLowerCase().endsWith('.json')) { alert("Please select a .json file. We can't read source code files!"); return; }
                processFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                if (!e.target.files[0].name.toLowerCase().endsWith('.json')) { alert("Please select a .json file. We can't read source code files!"); return; }
                processFile(e.target.files[0]);
            }
        });

        function processFile(file) {
            parseMoErgoFile(file, (err, rootData) => {
                if (err) return alert("Parsing Error: " + err.message);
                try {
                    const data = analyzeAndSortLayers(rootData);
                    renderResults(data);
                } catch (analysisErr) {
                    alert("Analysis Error: Something went wrong while scanning the layout. Check the console.");
                    console.error(analysisErr);
                }
            });
        }
    </script>
</body>
</html>
